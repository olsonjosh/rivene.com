<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 126 126" role="img" aria-labelledby="rivene-clear-title rivene-clear-desc">
  <title id="rivene-clear-title">rivene clear edge mark</title>
  <desc id="rivene-clear-desc">The rivene lightning mark with the selected Clear Edge material relief.</desc>
  <defs>
    <filter id="rivene-clear-edge" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feDropShadow dx="-1.9" dy="-1.9" stdDeviation="1.05" flood-color="#535e69" flood-opacity="0.36"/>
      <feDropShadow dx="2.55" dy="2.55" stdDeviation="2.05" flood-color="#ffffff" flood-opacity="0.72"/>
    </filter>
  </defs>
  <style>
    :root {
      color: #cad2db;
    }

    .rivene-mark {
      fill: var(--rivene-mark-color, currentColor);
      filter: url(#rivene-clear-edge);
    }
  </style>
  <path class="rivene-mark" d="M50 12 L96 69 H68 L76 114 L30 57 H58 Z"/>
</svg>
