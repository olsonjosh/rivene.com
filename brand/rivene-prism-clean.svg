<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="rivene-prism-title rivene-prism-desc">
  <title id="rivene-prism-title">Rivene prism mark</title>
  <desc id="rivene-prism-desc">A crisp faceted lightning mark on a clean white tile.</desc>
  <defs>
    <linearGradient id="tile" x1="38" y1="22" x2="218" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f6"/>
    </linearGradient>
    <linearGradient id="facet-dark" x1="72" y1="72" x2="126" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20262a"/>
      <stop offset="1" stop-color="#0f1316"/>
    </linearGradient>
    <linearGradient id="facet-mid" x1="116" y1="36" x2="178" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2e363a"/>
      <stop offset="1" stop-color="#667173"/>
    </linearGradient>
    <linearGradient id="facet-low" x1="128" y1="132" x2="165" y2="221" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d5dcdd"/>
      <stop offset="0.3" stop-color="#778284"/>
      <stop offset="1" stop-color="#252d31"/>
    </linearGradient>
    <filter id="lift" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="13" stdDeviation="11" flood-color="#111820" flood-opacity="0.18"/>
      <feDropShadow dx="-1" dy="-1" stdDeviation="0.6" flood-color="#ffffff" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect x="12" y="12" width="232" height="232" rx="48" fill="url(#tile)"/>
  <rect x="12.5" y="12.5" width="231" height="231" rx="47.5" fill="none" stroke="#dfe5ea"/>
  <g filter="url(#lift)">
    <path d="M101.6 31.5 194 139.2h-57.4l15.8 85.3L62 116.8h57.4Z" fill="#171d20"/>
    <path d="M101.6 31.5 137.6 139.2 194 139.2Z" fill="url(#facet-mid)"/>
    <path d="M62 116.8h57.4l17.2 22.4-46.8 18.4Z" fill="url(#facet-dark)"/>
    <path d="M89.8 157.6 136.6 139.2 152.4 224.5Z" fill="url(#facet-low)"/>
    <path d="M119.4 116.8 137.6 139.2 89.8 157.6Z" fill="#323b3d"/>
  </g>
</svg>
